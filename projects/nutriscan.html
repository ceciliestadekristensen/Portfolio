<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriScan | Cecilie Städe Kristensen</title>

  <style>
    :root {
      --bg: #07111f;
      --surface: rgba(13, 23, 40, 0.86);
      --border: rgba(148, 163, 184, 0.14);
      --text: #e8eef8;
      --muted: #a6b5cb;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius: 22px;
      --max-width: 1000px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      line-height: 1.7;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.15), transparent 30%),
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.12), transparent 28%),
        linear-gradient(180deg, #050a14 0%, #0b1422 100%);
    }

    .container {
      width: min(var(--max-width), calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 4rem;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 2rem;
      color: var(--muted);
      font-weight: 700;
    }

    .project-page {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      margin: 0;
    }

    .lead {
      color: var(--muted);
      max-width: 760px;
    }

    .hero-image {
      height: 260px;
      width: auto;
      display: block;
      margin: 2rem auto;
      border-radius: 18px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }

    .info-card {
      padding: 1rem;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    h2 { margin-top: 2rem; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .gallery-item {
      background: rgba(255,255,255,0.03);
      border-radius: 18px;
      position: relative;
      overflow: visible;
    }

    .gallery-image-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      padding: 1.2rem;
    }

    /* 💻 Computer frame */
    .monitor-frame {
      width: 100%;
      max-width: 480px;
    }

    .monitor-screen {
      aspect-ratio: 16/10;
      background: #0b0b0d;
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 18px 35px rgba(0,0,0,0.4);
    }

    .monitor-display {
      width: 100%;
      height: 100%;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    .monitor-display img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* 🔍 Hover zoom */
    .image-zoom {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      width: 520px;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
      z-index: 10;
    }

    .image-zoom-frame {
      background: #0b0b0d;
      padding: 10px;
      border-radius: 16px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }

    .image-zoom-display {
      aspect-ratio: 16/10;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    .image-zoom-display img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .gallery-image-wrap:hover .image-zoom {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .gallery-caption {
      padding: 1rem;
    }

    .gallery-caption strong {
      display: block;
      margin-bottom: 4px;
    }

    .gallery-caption span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>
  <div class="container">
    <a class="back-link" href="../index.html#projects">← Back</a>

    <div class="project-page">
      <h1>NutriScan</h1>

      <p class="lead">
        A frontend web prototype focused on making nutritional information easier to understand.
      </p>

      <img class="hero-image" src="../demo/nutriscan.gif">

      <h2>Highlights</h2>

      <div class="gallery">

        <!-- ITEM -->
        <div class="gallery-item">
          <div class="gallery-image-wrap">

            <div class="monitor-frame">
              <div class="monitor-screen">
                <div class="monitor-display">
                  <img src="../images/nutriscan-preview.png">
                </div>
              </div>
            </div>

            <div class="image-zoom">
              <div class="image-zoom-frame">
                <div class="image-zoom-display">
                  <img src="../images/nutriscan-preview.png">
                </div>
              </div>
            </div>

          </div>

          <div class="gallery-caption">
            <strong>Homepage</strong>
            <span>Main landing page with categories</span>
          </div>
        </div>

        <!-- ITEM -->
        <div class="gallery-item">
          <div class="gallery-image-wrap">

            <div class="monitor-frame">
              <div class="monitor-screen">
                <div class="monitor-display">
                  <img src="../images/redbull.png">
                </div>
              </div>
            </div>

            <div class="image-zoom">
              <div class="image-zoom-frame">
                <div class="image-zoom-display">
                  <img src="../images/redbull.png">
                </div>
              </div>
            </div>

          </div>

          <div class="gallery-caption">
            <strong>Product page</strong>
            <span>Structured nutritional layout</span>
          </div>
        </div>

        <!-- ITEM -->
        <div class="gallery-item">
          <div class="gallery-image-wrap">

            <div class="monitor-frame">
              <div class="monitor-screen">
                <div class="monitor-display">
                  <img src="../images/booster.png">
                </div>
              </div>
            </div>

            <div class="image-zoom">
              <div class="image-zoom-frame">
                <div class="image-zoom-display">
                  <img src="../images/booster.png">
                </div>
              </div>
            </div>

          </div>

          <div class="gallery-caption">
            <strong>Nutrition details</strong>

        </div>

        <!-- ITEM -->
        <div class="gallery-item">
          <div class="gallery-image-wrap">

            <div class="monitor-frame">
              <div class="monitor-screen">
                <div class="monitor-display">
                  <img src="../images/filters.png">
                </div>
              </div>
            </div>

            <div class="image-zoom">
              <div class="image-zoom-frame">
                <div class="image-zoom-display">
                  <img src="../images/filters.png">
                </div>
              </div>
            </div>

          </div>

          <div class="gallery-caption">
            <strong>Filtering</strong>
            <span>User preferences and filters</span>
          </div>
        </div>

      </div>

    </div>
  </div>
</body>
</html>

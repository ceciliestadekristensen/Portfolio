<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdopTree | Cecilie Städe Kristensen</title>

  <style>
    :root {
      --bg: #07111f;
      --surface: rgba(13, 23, 40, 0.86);
      --border: rgba(148, 163, 184, 0.14);
      --text: #e8eef8;
      --muted: #a6b5cb;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius: 22px;
      --max-width: 1000px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      line-height: 1.7;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.15), transparent 30%),
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.12), transparent 28%),
        linear-gradient(180deg, #050a14 0%, #0b1422 100%);
    }

    .container {
      width: min(var(--max-width), calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 4rem;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 2rem;
      color: var(--muted);
      font-weight: 700;
    }

    .project-page {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
    }

    .lead {
      color: var(--muted);
      max-width: 760px;
    }

    .hero-image {
      height: 350px;
      display: block;
      margin: 2rem auto;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }

    .info-card {
      padding: 1rem;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.2rem;
    }

    .gallery-item {
      background: rgba(255,255,255,0.03);
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }

    .gallery-image-wrap {
      display: flex;
      justify-content: center;
      padding: 1.2rem 0;
      position: relative; /* ✅ vigtigt fix */
    }

    .phone-frame {
      width: 180px;
      aspect-ratio: 9 / 19;
      background: #0a0a0a;
      border-radius: 32px;
      padding: 10px;
    }

    .phone-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 🔍 HOVER FIX */
    .image-zoom {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      width: min(420px, 85vw);
      opacity: 0;
      visibility: hidden;
      transition: 0.2s ease;
      z-index: 50;
    }

    .image-zoom-frame {
      background: #0b0b0d;
      padding: 10px;
      border-radius: 20px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }

    .image-zoom-display {
      aspect-ratio: 9 / 19;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
    }

    .image-zoom-display img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .gallery-image-wrap:hover .image-zoom {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    @media (max-width: 700px) {
      .gallery { grid-template-columns: 1fr; }
      .image-zoom { display: none; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="project-page">

      <h1>AdopTree</h1>

      <img class="hero-image" src="../demo/adoptree.gif">

      <h2>Highlights</h2>

      <div class="gallery">

        <div class="gallery-item">
          <div class="gallery-image-wrap">

            <div class="phone-frame">
              <div class="phone-screen">
                <img src="../images/adoptree-preview.png">
              </div>
            </div>

            <div class="image-zoom">
              <div class="image-zoom-frame">
                <div class="image-zoom-display">
                  <img src="../images/adoptree-preview.png">
                </div>
              </div>
            </div>

          </div>
        </div>

      </div>

    </div>
  </div>
</body>
</html>
